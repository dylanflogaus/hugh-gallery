# Hugh Gallery — Cloudflare Worker + static assets + D1
#
# Worker (your case — *.workers.dev):
#   1) npx wrangler d1 create hugh-gallery  (if needed)
#   2) Set database_id below; run: npx wrangler d1 migrations apply hugh-gallery --remote
#      (includes seed data so cart /api/gallery and Stripe checkout share the same piece IDs.)
#   3) Secrets:
#        npx wrangler secret put ADMIN_API_SECRET
#      Paste a long random string; use the same value when logging into /admin.html
#        npx wrangler secret put STRIPE_SECRET_KEY
#      Your Stripe secret key (sk_live_… or sk_test_…). Needed for cart checkout.
#   4) Deploy (copies HTML/CSS/JS/icons into public/, then uploads Worker + assets):
#        npm run deploy
#   5) Local: cp .dev.vars.example .dev.vars && npx wrangler d1 migrations apply hugh-gallery --local && npm run dev
#
name = "hugh-gallery"
main = "src/worker.js"
compatibility_date = "2024-11-01"

[assets]
directory = "public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "hugh-gallery"
database_id = "1b6cf3a5-2b7d-4180-9d82-e82fe24f082a"
